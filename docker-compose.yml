services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-afterschool-fsd:latest
    container_name: ai-afterschool-fsd-web
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      start_period: 40s
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ai-network
      - db-network

networks:
  ai-network:
    driver: bridge
  db-network:
    external: true
    name: ai-afterschool-ex_internal
