name: Deploy Next.js to Local Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci-gate:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        run: corepack enable pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm dlx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run typecheck

      - name: Unit Tests
        run: |
          if find src -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' -o -name '*.spec.tsx' 2>/dev/null | grep -q .; then
            pnpm run test
          else
            echo "::notice::No unit test files found — skipping"
          fi

  deploy:
    needs: ci-gate
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore production .env
        run: |
          ENV_STORE="$HOME/.env.ai-afterschool-fsd"
          if [ -f "$ENV_STORE" ]; then
            cp "$ENV_STORE" .env
          elif [ ! -f .env ]; then
            cp .env.example .env
            echo "::warning::운영 .env가 없어 .env.example을 사용합니다. $ENV_STORE에 운영 .env를 배치하세요."
          fi

      - name: Validate environment variables
        run: |
          ERRORS=()
          WARNINGS=()

          # --- 1) 자동 생성 가능한 변수 ---
          SECRET=$(grep -oP '^API_KEY_ENCRYPTION_SECRET=\K.+' .env 2>/dev/null || true)
          if [ -z "$SECRET" ]; then
            NEW_SECRET=$(openssl rand -hex 32)
            echo "API_KEY_ENCRYPTION_SECRET=$NEW_SECRET" >> .env
            WARNINGS+=("API_KEY_ENCRYPTION_SECRET 자동 생성됨 — 운영 .env 원본도 업데이트하세요")
          fi

          # --- 2) .env.example 기준: 운영 .env에 변수명이 존재하는지 검증 ---
          #   .env.example에 값이 있는 변수 = 필수 (누락 시 에러)
          #   .env.example에 값이 비어있는 변수 (KEY=) = 선택적 (누락 시 경고)
          while IFS='=' read -r key val; do
            # 주석, 빈 줄 건너뛰기
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue

            prod_val=$(grep -oP "^${key}=\K.+" .env 2>/dev/null || true)
            if [ -z "$prod_val" ]; then
              if [ -z "$val" ]; then
                WARNINGS+=("${key} (.env.example에 선택적)")
              elif [[ "$key" == NEXT_PUBLIC_* ]]; then
                ERRORS+=("${key} (빌드 시 클라이언트에 인라인)")
              fi
            fi
          done < <(grep -E '^[A-Z_]+=' .env.example)

          # --- 3) 서버 필수 변수 (런타임) ---
          for var in DATABASE_URL SESSION_SECRET; do
            val=$(grep -oP "^${var}=\K.+" .env 2>/dev/null || true)
            if [ -z "$val" ]; then
              ERRORS+=("${var} (서버 런타임 필수)")
            fi
          done

          # --- 결과 출력 ---
          for w in "${WARNINGS[@]}"; do
            echo "::warning::${w}"
          done

          if [ ${#ERRORS[@]} -gt 0 ]; then
            echo "::error::환경변수 누락: ${ERRORS[*]}"
            echo "운영 .env (~/.env.ai-afterschool-fsd)에 추가 후 재배포하세요."
            exit 1
          fi
          echo "::notice::환경변수 검증 통과"

      - name: Backup current image for rollback
        run: |
          if docker image inspect ai-afterschool-fsd:latest >/dev/null 2>&1; then
            docker tag ai-afterschool-fsd:latest ai-afterschool-fsd:rollback
            echo "ROLLBACK_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "::notice::최초 배포 — 롤백 이미지 없음"
            echo "ROLLBACK_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      - name: Build and deploy
        run: docker compose up -d --build

      - name: Wait for healthy
        id: healthcheck
        run: |
          echo "헬스체크 대기 중 (최대 120초)..."
          for i in $(seq 1 24); do
            if curl -sf http://127.0.0.1:3001/api/health > /dev/null 2>&1; then
              echo "::notice::헬스체크 통과 (${i}회차, $((i * 5))초)"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5
          done
          echo "::error::헬스체크 실패 — 120초 초과"
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Cleanup on success
        if: steps.healthcheck.outputs.healthy == 'true'
        run: docker image prune -f

      - name: Rollback on failure
        if: failure() && env.ROLLBACK_AVAILABLE == 'true'
        run: |
          echo "::warning::배포 실패 — 롤백 시작"
          docker tag ai-afterschool-fsd:rollback ai-afterschool-fsd:latest
          docker compose up -d
          echo "::notice::롤백 이미지로 컨테이너 재시작 완료"

      - name: Verify rollback health
        if: failure() && env.ROLLBACK_AVAILABLE == 'true'
        run: |
          echo "롤백 헬스체크 대기 중 (최대 60초)..."
          for i in $(seq 1 12); do
            if curl -sf http://127.0.0.1:3001/api/health > /dev/null 2>&1; then
              echo "::warning::롤백 성공 — 이전 버전으로 복원됨 (${i}회차, $((i * 5))초)"
              exit 0
            fi
            sleep 5
          done
          echo "::error::롤백 후에도 헬스체크 실패 — 수동 복구가 필요합니다"
          exit 1

      - name: Rollback unavailable
        if: failure() && env.ROLLBACK_AVAILABLE == 'false'
        run: |
          echo "::error::롤백 불가 — 이전 이미지가 없습니다. 수동 복구가 필요합니다."
          exit 1
