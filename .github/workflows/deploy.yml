name: Deploy Next.js to Local Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # 직접 구축한 운영 서버의 러너 타겟팅

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore production .env
        run: |
          # 운영 .env는 ~/.env.ai-afterschool-fsd에 보관
          # checkout이 작업 디렉토리를 교체하므로 외부에서 복원
          ENV_STORE="$HOME/.env.ai-afterschool-fsd"
          if [ -f "$ENV_STORE" ]; then
            cp "$ENV_STORE" .env
          elif [ ! -f .env ]; then
            cp .env.example .env
            echo "::warning::운영 .env가 없어 .env.example을 사용합니다. $ENV_STORE에 운영 .env를 배치하세요."
          fi

      - name: Build and Deploy using Docker Compose
        run: |
          docker compose up -d --build
          docker image prune -f
