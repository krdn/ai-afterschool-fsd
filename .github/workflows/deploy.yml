name: Deploy Next.js to Local Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # 직접 구축한 운영 서버의 러너 타겟팅

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy using Docker Compose
        run: |
          # 1. 초기 세팅 대응: .env 서버에 없으면 .env.example 복사
          if [ ! -f .env ]; then cp .env.example .env; fi
          
          # 2. 도커 컴포즈 캐시 무시하고 강제 빌드 및 백그라운드 재시작
          # 현재 디렉토리 기준(ai-afterschool-fsd)으로 실행되며 127.0.0.1:3000 바인딩
          docker-compose up -d --build
          
          # 3. 디스크 풀 방지를 위한 불필요한 도커(<none>) 이미지 즉시 정리
          docker image prune -f
