name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm dlx prisma generate

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
        env:
          # Sentry 소스맵 업로드 비활성화 (CI에서는 불필요)
          SENTRY_AUTH_TOKEN: ""
