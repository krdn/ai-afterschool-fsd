name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        run: corepack enable pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm dlx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Lint
        run: pnpm run lint

      - name: Check env sync (소스코드 ↔ .env.example)
        run: |
          # 소스코드에서 사용하는 NEXT_PUBLIC_ 변수 추출
          CODE_VARS=$(grep -rhoP 'process\.env\.(NEXT_PUBLIC_\w+)' src/ | sed 's/process\.env\.//' | sort -u)

          # .env.example에 정의된 NEXT_PUBLIC_ 변수
          EXAMPLE_VARS=$(grep -oP '^NEXT_PUBLIC_\w+(?==)' .env.example | sort -u)

          # 코드에는 있지만 .env.example에 없는 변수
          MISSING=""
          for var in $CODE_VARS; do
            if ! echo "$EXAMPLE_VARS" | grep -q "^${var}$"; then
              MISSING="$MISSING $var"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::소스코드에서 사용하지만 .env.example에 누락된 변수:$MISSING"
            echo ".env.example에 추가해야 운영 배포 시 검증됩니다."
            exit 1
          fi
          echo "::notice::env 동기화 확인 완료"

      - name: Type Check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          SENTRY_AUTH_TOKEN: ""

      - name: Unit Tests
        run: |
          if find src -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' -o -name '*.spec.tsx' 2>/dev/null | grep -q .; then
            pnpm run test
          else
            echo "::notice::No unit test files found — skipping"
          fi

      - name: E2E Tests
        run: |
          if [ -d "e2e" ] && find e2e -name '*.spec.ts' -o -name '*.test.ts' 2>/dev/null | grep -q .; then
            pnpm exec playwright install --with-deps chromium
            pnpm run test:e2e
          else
            echo "::notice::No E2E test files found — skipping"
          fi
        continue-on-error: true

  # CI 실패 시 이메일 알림
  notify-failure:
    needs: validate
    runs-on: self-hosted
    if: failure()
    steps:
      - name: Send CI failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[CI 실패] ai-afterschool-fsd — PR #${{ github.event.pull_request.number }}"
          to: ${{ secrets.GMAIL_USERNAME }}
          from: AI Afterschool CI <${{ secrets.GMAIL_USERNAME }}>
          body: |
            ## CI 실패 알림

            | 항목 | 값 |
            |------|-----|
            | **PR** | #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }} |
            | **브랜치** | ${{ github.head_ref }} → ${{ github.base_ref }} |
            | **작성자** | ${{ github.actor }} |

            ### Actions 로그
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            _이 메일은 GitHub Actions에서 자동 발송되었습니다._
          content_type: text/markdown
