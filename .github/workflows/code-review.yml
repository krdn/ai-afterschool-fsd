name: AI Code Review

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  review:
    runs-on: self-hosted
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login != 'github-actions[bot]'

    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              core.setOutput('skip', 'true');
              console.log('PR 정보 없음 — 건너뜀');
              return;
            }
            const pr = prs[0];
            core.setOutput('skip', 'false');
            core.setOutput('number', pr.number.toString());
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_sha', context.payload.workflow_run.head_sha);

      - name: Checkout
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Get PR diff
        if: steps.pr.outputs.skip != 'true'
        id: diff
        run: |
          # lock 파일, 자동생성 파일 제외한 diff 추출
          git diff origin/${{ steps.pr.outputs.base_ref }}...${{ steps.pr.outputs.head_sha }} \
            -- . \
            ':!pnpm-lock.yaml' \
            ':!*.lock' \
            ':!*.generated.*' \
            ':!*.min.*' \
            > /tmp/pr-diff.txt

          DIFF_SIZE=$(wc -c < /tmp/pr-diff.txt)
          echo "size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"
          echo "diff 크기: ${DIFF_SIZE} bytes"

      - name: Get changed files
        if: steps.pr.outputs.skip != 'true'
        run: |
          git diff --name-only origin/${{ steps.pr.outputs.base_ref }}...${{ steps.pr.outputs.head_sha }} \
            -- . \
            ':!pnpm-lock.yaml' \
            ':!*.lock' \
            ':!*.generated.*' \
            ':!*.min.*' \
            > /tmp/changed-files.txt

      - name: Skip if diff too small
        if: steps.pr.outputs.skip != 'true'
        id: check
        run: |
          SIZE=${{ steps.diff.outputs.size }}
          if [ "$SIZE" -lt 50 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "diff가 너무 작아 리뷰 건너뜀 (${SIZE} bytes)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify changed files
        if: steps.pr.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        id: classify
        run: |
          HINTS=""
          FILES=$(cat /tmp/changed-files.txt)

          echo "$FILES" | grep -q "prisma/schema" && \
            HINTS="${HINTS}\n- [Prisma] 스키마 변경: migration 안전성, 기존 데이터 호환성 확인"
          echo "$FILES" | grep -q "src/lib/actions/" && \
            HINTS="${HINTS}\n- [Server Action] verifySession() 호출, ActionResult 반환 패턴 확인"
          echo "$FILES" | grep -q "src/app/.*api/" && \
            HINTS="${HINTS}\n- [API Route] 인증 미들웨어, 에러 응답 형식 확인"
          echo "$FILES" | grep -q "src/features/" && \
            HINTS="${HINTS}\n- [Feature] FSD 레이어 규칙 위반 여부 확인"
          echo "$FILES" | grep -q "src/middleware" && \
            HINTS="${HINTS}\n- [Middleware] Edge Runtime 호환성, 성능 영향 확인"

          if [ -n "$HINTS" ]; then
            {
              echo "hints<<EOF"
              echo -e "$HINTS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "hints=" >> "$GITHUB_OUTPUT"
          fi

      - name: AI Review with GLM-5
        if: steps.pr.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        id: review
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          # 시스템 프롬프트 읽기
          SYSTEM_PROMPT=$(cat .github/prompts/review-system.md)

          # diff 읽기 (100KB 제한 — 토큰 절약) + 잘림 감지
          DIFF_FULL_SIZE=$(wc -c < /tmp/pr-diff.txt)
          DIFF=$(head -c 100000 /tmp/pr-diff.txt)

          if [ "$DIFF_FULL_SIZE" -gt 100000 ]; then
            echo "truncated=true" >> "$GITHUB_OUTPUT"
            echo "full_size=$DIFF_FULL_SIZE" >> "$GITHUB_OUTPUT"
          else
            echo "truncated=false" >> "$GITHUB_OUTPUT"
          fi

          FILES=$(cat /tmp/changed-files.txt)
          HINTS='${{ steps.classify.outputs.hints }}'

          # user 메시지 구성 (파일 유형별 힌트 포함)
          USER_MSG="## 변경된 파일
          $FILES"

          if [ -n "$HINTS" ]; then
            USER_MSG="${USER_MSG}

          ## 파일 유형별 주의사항
          ${HINTS}"
          fi

          USER_MSG="${USER_MSG}

          ## Diff
          \`\`\`diff
          $DIFF
          \`\`\`"

          # JSON 페이로드 구성
          PAYLOAD=$(jq -n \
            --arg model "glm-5" \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_MSG" \
            '{
              model: $model,
              messages: [
                { role: "system", content: $system },
                { role: "user", content: $user }
              ],
              max_tokens: 2048,
              temperature: 0.3
            }')

          # GLM-5 API 호출 (재시도 2회, 지수 백오프)
          MAX_RETRIES=2
          RETRY_DELAY=5
          SUCCESS=false

          for ATTEMPT in $(seq 0 $MAX_RETRIES); do
            if [ "$ATTEMPT" -gt 0 ]; then
              WAIT=$((RETRY_DELAY * ATTEMPT))
              echo "재시도 ${ATTEMPT}/${MAX_RETRIES} (${WAIT}초 대기)"
              sleep $WAIT
            fi

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "https://api.z.ai/api/paas/v4/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $ZHIPU_API_KEY" \
              -d "$PAYLOAD")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "$BODY" | jq -r '.choices[0].message.content // "응답 파싱 실패"' > /tmp/review-result.txt
              SUCCESS=true
              break
            fi

            echo "API 호출 실패 (HTTP $HTTP_CODE)"

            # 401/403은 인증 문제 — 재시도 무의미
            if [ "$HTTP_CODE" -eq 401 ] || [ "$HTTP_CODE" -eq 403 ]; then
              echo "인증 실패 — 재시도하지 않음"
              break
            fi
          done

          if [ "$SUCCESS" = false ]; then
            case "$HTTP_CODE" in
              401|403)
                MSG="API 인증 실패 (HTTP $HTTP_CODE). ZHIPU_API_KEY 시크릿을 확인해주세요."
                ;;
              429)
                MSG="API 요청 한도 초과 (HTTP 429). 잠시 후 PR을 다시 동기화해주세요."
                ;;
              500|502|503)
                MSG="Zhipu AI 서버 오류 (HTTP $HTTP_CODE). 일시적 문제일 수 있습니다."
                ;;
              *)
                MSG="API 호출 실패 (HTTP $HTTP_CODE). 수동 리뷰가 필요합니다."
                ;;
            esac
            echo "$MSG" > /tmp/review-result.txt
          fi

          echo "리뷰 완료"

      - name: Post review comment
        if: steps.pr.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review-result.txt', 'utf-8').trim();
            const marker = '<!-- ai-review -->';
            const truncated = '${{ steps.review.outputs.truncated }}' === 'true';
            const fullSize = '${{ steps.review.outputs.full_size }}';
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');

            const body = [
              marker,
              '## AI Code Review (GLM-5)',
              '',
              truncated ? `> **Note**: Diff가 100KB를 초과하여 일부만 리뷰되었습니다 (전체 ${fullSize} bytes)\n` : '',
              review,
              '',
              `---`,
              `_PR diff ${{ steps.diff.outputs.size }} bytes | ${new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' })}_`,
            ].join('\n');

            // 기존 봇 코멘트 찾기
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.body && c.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
              console.log(`코멘트 업데이트: ${botComment.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log('새 코멘트 작성');
            }

            // Critical 이슈 시 라벨 자동 부착
            const hasCritical = review.includes('Critical');

            if (hasCritical) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: ['needs-fix']
                });
                console.log('needs-fix 라벨 추가');
              } catch (e) {
                console.log('라벨 추가 실패:', e.message);
              }
            } else {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: 'needs-fix'
                });
              } catch (e) { /* 라벨 미존재 시 무시 */ }
            }

  ci-failed-notice:
    runs-on: self-hosted
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Post CI failure notice
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) return;

            const prNumber = prs[0].number;
            const marker = '<!-- ai-review -->';

            const body = [
              marker,
              '## AI Code Review (GLM-5)',
              '',
              '> CI 검증이 실패하여 AI 리뷰를 건너뜁니다. CI 오류를 먼저 수정해주세요.',
              '',
              `---`,
              `_${new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' })}_`,
            ].join('\n');

            // 기존 봇 코멘트 찾기
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.body && c.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
